<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siyoon's VOCARCHIVE</title>
<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#bfe6ff,#e9f6ff);
}
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;
  background:rgba(255,255,255,.4);
  backdrop-filter:blur(10px);
}
button,select,input,textarea{
  border-radius:12px;
  border:1px solid rgba(255,255,255,.6);
  padding:8px;
  background:rgba(255,255,255,.6);
}
.tab{cursor:pointer;margin-right:6px;}
.tab.active{background:white;font-weight:bold;}
.card{
  margin:16px;
  padding:16px;
  border-radius:20px;
  background:rgba(255,255,255,.4);
  backdrop-filter:blur(12px);
}
.hidden{display:none;}
.flash{
  text-align:center;
  min-height:200px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.front{font-size:28px;font-weight:bold;}
.back{font-size:20px;margin-top:10px;display:none;}
.days-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
  gap:8px;
}
table{width:100%;border-collapse:collapse;}
td,th{padding:6px;border-bottom:1px solid rgba(0,0,0,.1);}
</style>
</head>
<body>

<header>
  <div><b>Siyoon's VOCARCHIVE</b></div>
  <div>
    <button class="tab active" id="tabHome">home</button>
    <button class="tab" id="tabDays">days</button>
    <button class="tab" id="tabList">list</button>
  </div>
</header>

<div id="homeView" class="card">
  <div>
    <select id="source">
      <option value="days">days</option>
      <option value="list">list</option>
      <option value="both">both</option>
    </select>
    <button id="startBtn">start</button>
  </div>
  <div class="flash">
    <div id="meta"></div>
    <div class="front" id="front">Siyoon's VOCARCHIVE</div>
    <div class="back" id="back"></div>
  </div>
  <button id="flipBtn">flip</button>
  <button id="nextBtn">next</button>
</div>

<div id="daysView" class="card hidden">
  <div>
    <button id="selectAll">전체 선택</button>
    <button id="clearAll">초기화</button>
    <button id="goStudy">study!</button>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<div id="listView" class="card hidden">
  <div>
    <input id="wordInput" placeholder="word">
    <input id="meaningInput" placeholder="meaning">
    <button id="addBtn">add</button>
  </div>
  <textarea id="bulkArea" placeholder="emaciated 야윈, 수척한"></textarea>
  <button id="importBtn">import</button>
  <table>
    <thead><tr><th>word</th><th>meaning</th><th></th></tr></thead>
    <tbody id="listTable"></tbody>
  </table>
</div>

<script>
const STORAGE="vocarchive_list";
let myCards=JSON.parse(localStorage.getItem(STORAGE)||"[]");
let daysData={};
let selectedDays=new Set();
let session=[];
let idx=0;
let showBack=false;

async function loadDays(){
  try{
    const res=await fetch("days.json");
    daysData=await res.json();
  }catch(e){daysData={};}
  renderDays();
}
loadDays();

function save(){localStorage.setItem(STORAGE,JSON.stringify(myCards));}

function renderDays(){
  const grid=document.getElementById("daysGrid");
  grid.innerHTML="";
  for(let i=1;i<=60;i++){
    const key="day"+i;
    const div=document.createElement("div");
    div.innerHTML=`<label><input type="checkbox" data-day="${key}"> ${key}</label>`;
    grid.appendChild(div);
  }
  grid.querySelectorAll("input").forEach(cb=>{
    cb.onchange=()=>{cb.checked?selectedDays.add(cb.dataset.day):selectedDays.delete(cb.dataset.day);}
  });
}

function buildSession(){
  let pool=[];
  const src=document.getElementById("source").value;
  if(src==="days"||src==="both"){
    selectedDays.forEach(d=>{
      (daysData[d]||[]).forEach(x=>pool.push(x));
    });
  }
  if(src==="list"||src==="both"){
    myCards.forEach(x=>pool.push(x));
  }
  session=pool.sort(()=>Math.random()-0.5);
  idx=0;
  showBack=false;
  showCard();
}

function showCard(){
  if(session.length===0){
    document.getElementById("front").textContent="Siyoon's VOCARCHIVE";
    document.getElementById("back").style.display="none";
    return;
  }
  if(idx>=session.length){
    document.getElementById("front").textContent="DONE";
    document.getElementById("back").style.display="none";
    return;
  }
  const card=session[idx];
  document.getElementById("meta").textContent=(idx+1)+" / "+session.length;
  document.getElementById("front").textContent=card.word;
  document.getElementById("back").textContent=card.meaning;
  document.getElementById("back").style.display=showBack?"block":"none";
}

document.getElementById("flipBtn").onclick=()=>{
  showBack=!showBack;
  document.getElementById("back").style.display=showBack?"block":"none";
};
document.getElementById("nextBtn").onclick=()=>{
  idx++;
  showBack=false;
  showCard();
};
document.getElementById("startBtn").onclick=buildSession;

document.getElementById("addBtn").onclick=()=>{
  const w=wordInput.value.trim();
  const m=meaningInput.value.trim();
  if(!w||!m)return;
  myCards.push({word:w,meaning:m});
  save();
  renderList();
};

function parseBulk(text){
  const lines=text.split(/\n+/);
  const result=[];
  lines.forEach(l=>{
    l=l.trim();
    if(!l)return;
    if(l.includes("|")){
      const [w,...rest]=l.split("|");
      result.push({word:w.trim(),meaning:rest.join("|").trim()});
    }else{
      const match=l.match(/^(.+?)\s+([가-힣].*)$/);
      if(match){
        result.push({word:match[1].trim(),meaning:match[2].trim()});
      }
    }
  });
  return result;
}

document.getElementById("importBtn").onclick=()=>{
  const rows=parseBulk(bulkArea.value);
  rows.forEach(r=>myCards.push(r));
  save();
  renderList();
};

function renderList(){
  const tbody=document.getElementById("listTable");
  tbody.innerHTML="";
  myCards.forEach((c,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${c.word}</td><td>${c.meaning}</td><td><button data-i="${i}">del</button></td>`;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{myCards.splice(b.dataset.i,1);save();renderList();}
  });
}
renderList();

document.getElementById("selectAll").onclick=()=>{
  selectedDays.clear();
  for(let i=1;i<=60;i++)selectedDays.add("day"+i);
  document.querySelectorAll("#daysGrid input").forEach(cb=>cb.checked=true);
};
document.getElementById("clearAll").onclick=()=>{
  selectedDays.clear();
  document.querySelectorAll("#daysGrid input").forEach(cb=>cb.checked=false);
};
document.getElementById("goStudy").onclick=()=>{
  setTab("home");
};

function setTab(t){
  homeView.classList.add("hidden");
  daysView.classList.add("hidden");
  listView.classList.add("hidden");
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  if(t==="home"){homeView.classList.remove("hidden");tabHome.classList.add("active");}
  if(t==="days"){daysView.classList.remove("hidden");tabDays.classList.add("active");}
  if(t==="list"){listView.classList.remove("hidden");tabList.classList.add("active");}
}
tabHome.onclick=()=>setTab("home");
tabDays.onclick=()=>setTab("days");
tabList.onclick=()=>setTab("list");
</script>

</body>
</html>
