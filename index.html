<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOCARCHIVE</title>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:linear-gradient(135deg,#bfe6ff,#eaf7ff);
}
header{
  display:flex;
  justify-content:space-between;
  padding:16px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.4);
}
.tab{
  border:none;
  padding:8px 14px;
  margin-left:6px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  cursor:pointer;
}
.active{background:white;font-weight:600;}
.card{
  margin:24px auto;
  max-width:600px;
  padding:30px;
  border-radius:30px;
  background:rgba(255,255,255,0.45);
  backdrop-filter:blur(25px);
  text-align:center;
}
button{
  border:none;
  border-radius:18px;
  padding:8px 14px;
  margin:6px;
  background:rgba(255,255,255,0.7);
  cursor:pointer;
}
.flash{
  font-size:28px;
  margin:40px 0;
  min-height:100px;
}
.hidden{display:none;}
.days-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
  gap:8px;
  margin-top:15px;
}
</style>
</head>
<body>

<header>
  <div><b>VOCARCHIVE</b></div>
  <div>
    <button class="tab active" onclick="setTab('home')" id="tabHome">home</button>
    <button class="tab" onclick="setTab('days')" id="tabDays">days</button>
    <button class="tab" onclick="setTab('list')" id="tabList">list</button>
  </div>
</header>

<div id="home" class="card">
  <div>
    <button onclick="start()">start</button>
    <button onclick="random100()">random</button>
  </div>

  <div class="flash" id="card">VOCARCHIVE</div>

  <div>
    <button onclick="prev()">before</button>
    <button onclick="flip()">flip</button>
    <button onclick="next()">next</button>
  </div>
</div>

<div id="days" class="card hidden">
  <div>
    <button onclick="selectAll()">전체</button>
    <button onclick="clearAll()">초기화</button>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<div id="list" class="card hidden">
  <input id="word" placeholder="word">
  <input id="meaning" placeholder="meaning">
  <button onclick="add()">add</button>
</div>

<script>
let daysData={};
let selectedDays=new Set();
let session=[];
let index=0;
let flipped=false;

fetch("days.json")
.then(r=>r.json())
.then(data=>{
  daysData=data;
  renderDays();
});

function renderDays(){
  const grid=document.getElementById("daysGrid");
  for(let i=1;i<=60;i++){
    const key="day"+i;
    const div=document.createElement("div");
    div.innerHTML=`<label><input type="checkbox" value="${key}"> ${key}</label>`;
    grid.appendChild(div);
  }
  grid.querySelectorAll("input").forEach(cb=>{
    cb.onchange=()=>{
      cb.checked?selectedDays.add(cb.value):selectedDays.delete(cb.value);
    }
  });
}

function buildPool(){
  let pool=[];
  selectedDays.forEach(d=>{
    (daysData[d]||[]).forEach(w=>pool.push(w));
  });
  return pool;
}

function start(){
  session=shuffle(buildPool());
  index=0;
  flipped=false;
  show();
}

function random100(){
  let pool=shuffle(buildPool());
  session=pool.slice(0,100);
  index=0;
  flipped=false;
  show();
}

function show(){
  if(session.length===0){
    document.getElementById("card").innerText="VOCARCHIVE";
    return;
  }
  const word=session[index];
  document.getElementById("card").innerText=flipped?word.meaning:word.word;
}

function flip(){
  flipped=!flipped;
  show();
}

function next(){
  if(index<session.length-1){
    index++;
    flipped=false;
    show();
  }
}

function prev(){
  if(index>0){
    index--;
    flipped=false;
    show();
  }
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function setTab(tab){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("days").classList.add("hidden");
  document.getElementById("list").classList.add("hidden");
  document.getElementById(tab).classList.remove("hidden");
}

function selectAll(){
  selectedDays.clear();
  document.querySelectorAll("#daysGrid input").forEach(cb=>{
    cb.checked=true;
    selectedDays.add(cb.value);
  });
}

function clearAll(){
  selectedDays.clear();
  document.querySelectorAll("#daysGrid input").forEach(cb=>{
    cb.checked=false;
  });
}

function add(){
  const w=document.getElementById("word").value.trim();
  const m=document.getElementById("meaning").value.trim();
  if(!w||!m)return;
  if(!daysData["custom"]) daysData["custom"]=[];
  daysData["custom"].push({word:w,meaning:m});
}
</script>

</body>
</html>
